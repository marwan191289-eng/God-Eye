kind = "mobile"
previewPath = "/war-room-mobile"
title = "WAR ROOM Mobile"
version = "1.0.0"
id = "artifacts/war-room-mobile"
router = "path"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = ["/war-room-mobile"]
localPort = 0

[services.development]
run = "pnpm --filter @workspace/war-room-mobile run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/war-room-mobile", "run", "build"]
run = ["pnpm", "--filter", "@workspace/war-room-mobile", "run", "serve"]
